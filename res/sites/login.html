<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – JustInCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../../index.html">
                <i class="bi bi-phone me-1"></i>JustInCase
            </a>
        </div>
    </nav>

    <main class="container my-4" style="max-width: 450px;">
        <h2 class="mb-3">Login</h2>

        <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form" novalidate>
            <div class="mb-3">
                <label class="form-label">Benutzername</label>
                <input type="text" class="form-control" name="login" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Passwort</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="remember" id="remember">
                <label class="form-check-label" for="remember">Eingeloggt bleiben</label>
            </div>
            <button type="submit" class="btn btn-dark w-100">Login</button>
            <p class="mt-3 small text-center">
                Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
            </p>
        </form>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>window.API_BASE_URL = '../../logic/';</script>
    <script src="../js/api.js"></script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
