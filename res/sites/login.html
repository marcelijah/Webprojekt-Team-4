<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – JustInCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
</head>
<body class="site-bg">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold mx-auto" href="../../index.html">
                <i class="bi bi-phone me-1"></i>JustInCase
            </a>
        </div>
    </nav>

    <main class="container auth-main">
        <div class="auth-card" style="max-width: 430px;">
        <h2 class="mb-3">Login</h2>

        <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form" novalidate>
            <div class="mb-3">
                <label class="form-label">Benutzername</label>
                <input type="text" class="form-control" name="login" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Passwort</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="remember" id="remember">
                <label class="form-check-label" for="remember">Eingeloggt bleiben</label>
            </div>
            <button type="submit" class="btn btn-dark w-100">Login</button>
            <p class="mt-3 small text-center">
                Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
            </p>
        </form>
        </div>
    </main>

    <footer class="footer mt-auto py-4 bg-dark text-white">
        <div class="container">
            <div class="row gy-3">
                <div class="col-md-4">
                    <h6 class="fw-bold mb-2"><i class="bi bi-phone me-1"></i>JustInCase</h6>
                    <p class="text-secondary small mb-0">Premium Handyhüllen für alle aktuellen iPhone-Modelle.</p>
                </div>
                <div class="col-md-4">
                    <h6 class="fw-bold mb-2">Schnelllinks</h6>
                    <ul class="list-unstyled small mb-0">
                        <li><a href="../../index.html" class="footer-link">Startseite</a></li>
                        <li><a href="cart.html" class="footer-link">Warenkorb</a></li>
                        <li><a href="login.html" class="footer-link">Anmelden</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h6 class="fw-bold mb-2">Rechtliches</h6>
                    <ul class="list-unstyled small mb-0">
                        <li><a href="imprint.html" class="footer-link">Impressum</a></li>
                        <li><a href="privacy.html" class="footer-link">Datenschutz</a></li>
                    </ul>
                </div>
            </div>
            <hr class="border-secondary mt-3 mb-2">
            <p class="text-secondary text-center small mb-0">
                &copy; 2026 JustInCase - WebShop Team 4
            </p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>window.API_BASE_URL = '../../logic/';</script>
    <script src="../js/api.js"></script>
    <script src="../js/site_media.js"></script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
