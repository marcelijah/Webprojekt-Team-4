<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren – JustInCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
</head>
<body class="site-bg">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold mx-auto" href="../../index.html">
                <i class="bi bi-phone me-1"></i>JustInCase
            </a>
        </div>
    </nav>

    <main class="container auth-main">
        <div class="auth-card" style="max-width: 600px;">
        <h2 class="mb-3">Registrierung</h2>

        <div id="register-alert" class="alert d-none" role="alert"></div>

        <form id="register-form" novalidate>
            <div class="mb-3">
                <label class="form-label">Anrede</label>
                <select class="form-select" name="salutation" required>
                    <option value="">Bitte wählen</option>
                    <option value="Herr">Herr</option>
                    <option value="Frau">Frau</option>
                    <option value="Divers">Divers</option>
                </select>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Vorname</label>
                    <input type="text" class="form-control" name="first_name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nachname</label>
                    <input type="text" class="form-control" name="last_name" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Adresse</label>
                <input type="text" class="form-control" name="address" required>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">PLZ</label>
                    <input type="text" class="form-control" name="zip" pattern="[0-9]+" required>
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Ort</label>
                    <input type="text" class="form-control" name="city" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">E-Mail</label>
                <input type="email" class="form-control" name="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Benutzername</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Passwort</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Registrieren</button>
            <p class="mt-3 small text-center">
                Schon registriert? <a href="login.html">Zum Login</a>
            </p>
        </form>
        </div>
    </main>

    <footer class="footer mt-auto py-4 bg-dark text-white">
        <div class="container">
            <div class="row gy-3">
                <div class="col-md-4">
                    <h6 class="fw-bold mb-2"><i class="bi bi-phone me-1"></i>JustInCase</h6>
                    <p class="text-secondary small mb-0">Premium Handyhüllen für alle aktuellen iPhone-Modelle.</p>
                </div>
                <div class="col-md-4">
                    <h6 class="fw-bold mb-2">Schnelllinks</h6>
                    <ul class="list-unstyled small mb-0">
                        <li><a href="../../index.html" class="footer-link">Startseite</a></li>
                        <li><a href="cart.html" class="footer-link">Warenkorb</a></li>
                        <li><a href="login.html" class="footer-link">Anmelden</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h6 class="fw-bold mb-2">Rechtliches</h6>
                    <ul class="list-unstyled small mb-0">
                        <li><a href="imprint.html" class="footer-link">Impressum</a></li>
                        <li><a href="privacy.html" class="footer-link">Datenschutz</a></li>
                    </ul>
                </div>
            </div>
            <hr class="border-secondary mt-3 mb-2">
            <p class="text-secondary text-center small mb-0">
                &copy; 2026 JustInCase - WebShop Team 4
            </p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>window.API_BASE_URL = '../../logic/';</script>
    <script src="../js/api.js"></script>
    <script src="../js/site_media.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
